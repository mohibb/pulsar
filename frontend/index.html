<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PULSAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#a78bfa', dim: '#7c3aed' },
            surface: { DEFAULT: '#0d0f14', card: '#141720', border: '#1e2230' },
          },
        },
      },
    };
  </script>
  <style>
    body { background: #0d0f14; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .card { background: #141720; border: 1px solid #1e2230; border-radius: 0.75rem; }
    .btn { cursor: pointer; border-radius: 0.5rem; padding: 0.5rem 1.25rem; font-size: 0.875rem; font-weight: 600; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #a78bfa; color: #0d0f14; }
    .btn-danger  { background: #ef4444; color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid #1e2230; color: #94a3b8; }
    .tag { display: inline-flex; align-items: center; border-radius: 9999px; padding: 0.15rem 0.65rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em; }
    .tag-buy        { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .tag-strong-buy { background: rgba(16,185,129,0.15); color: #34d399; }
    .tag-neutral    { background: rgba(148,163,184,0.15);color: #94a3b8; }
    .tag-caution    { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .tag-sell       { background: rgba(239,68,68,0.15);  color: #f87171; }
    .tag-hold       { background: rgba(99,102,241,0.15); color: #818cf8; }
    .pos { color: #4ade80; } .neg { color: #f87171; }
    input  { background: #0d0f14; border: 1px solid #1e2230; border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #e2e8f0; outline: none; width: 100%; }
    input:focus  { border-color: #a78bfa; }
    select { background: #0d0f14; border: 1px solid #1e2230; border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #e2e8f0; outline: none; width: 100%; }
    select:focus { border-color: #a78bfa; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { color: #64748b; font-weight: 600; text-align: left; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e2230; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #0d0f14; }
    tr:last-child td { border-bottom: none; }
    .spinner { border: 2px solid #1e2230; border-top-color: #a78bfa; border-radius: 50%; width: 1.25rem; height: 1.25rem; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tab { padding: 0.5rem 1rem; border-bottom: 2px solid transparent; color: #64748b; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .tab.active { border-bottom-color: #a78bfa; color: #a78bfa; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; padding: 0.75rem 1.25rem; border-radius: 0.5rem; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .star-btn { background: none; border: none; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0.25rem; opacity: 0.6; transition: opacity 0.15s; }
    .star-btn:hover { opacity: 1; }
    .star-btn.watched { opacity: 1; color: #fbbf24; }
  </style>
</head>
<body>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<!-- Login overlay -->
<div id="loginScreen" class="fixed inset-0 flex items-center justify-center z-50" style="background:#0d0f14">
  <div class="card p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-6">
      <div class="text-4xl font-bold tracking-widest" style="color:#a78bfa">PULSAR</div>
      <div class="text-slate-500 text-xs mt-1">Crypto Intelligence Dashboard</div>
    </div>
    <div class="space-y-4">
      <div>
        <label class="text-xs text-slate-400 mb-1 block">Username</label>
        <input id="loginUser" type="text" placeholder="username" autocomplete="username" />
      </div>
      <div>
        <label class="text-xs text-slate-400 mb-1 block">Password</label>
        <input id="loginPass" type="password" placeholder="password" autocomplete="current-password" />
      </div>
      <div id="loginError" class="text-red-400 text-xs hidden"></div>
      <button class="btn btn-primary w-full" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- Main app (hidden until logged in) -->
<div id="app" class="hidden min-h-screen">

  <!-- Navbar -->
  <nav class="sticky top-0 z-40 border-b" style="background:rgba(13,15,20,0.95);backdrop-filter:blur(8px);border-color:#1e2230">
    <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-14">
      <span class="font-bold tracking-widest text-lg" style="color:#a78bfa">PULSAR</span>
      <div class="flex items-center gap-3">
        <span id="navUser" class="text-slate-400 text-xs hidden sm:block"></span>
        <span id="navAdmin" class="tag tag-buy hidden">ADMIN</span>
        <button class="btn btn-ghost text-xs" onclick="doLogout()">Sign out</button>
      </div>
    </div>
  </nav>

  <!-- Tab bar -->
  <div class="border-b" style="border-color:#1e2230">
    <div class="max-w-7xl mx-auto px-4 flex gap-1">
      <div class="tab active" data-tab="market"    onclick="switchTab('market')">Market</div>
      <div class="tab"        data-tab="signals"   onclick="switchTab('signals')">Signals</div>
      <div class="tab"        data-tab="portfolio" onclick="switchTab('portfolio')">Portfolio</div>
      <div class="tab"        data-tab="news"      onclick="switchTab('news')">News</div>
      <div class="tab"        data-tab="admin"     onclick="switchTab('admin')" id="adminTab" style="display:none">Admin</div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- ── Market tab ─────────────────────────────────────────────── -->
    <div id="tab-market">
      <div id="marketStats" class="card p-4 grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm mb-6"></div>
      <div class="grid lg:grid-cols-3 gap-6">
        <div class="card p-5">
          <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Fear &amp; Greed Index</div>
          <div id="fgGauge" class="flex flex-col items-center">
            <div class="spinner"></div>
          </div>
        </div>
        <div class="lg:col-span-2 space-y-3" id="coinList">
          <div class="flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Loading coins…</span></div>
        </div>
      </div>
    </div>

    <!-- ── Signals tab ────────────────────────────────────────────── -->
    <div id="tab-signals" class="hidden space-y-6">
      <div class="card overflow-x-auto" id="signalsTable">
        <div class="p-4 flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Loading signals…</span></div>
      </div>
      <div class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Signal Backtest</div>
        <div class="flex gap-3 items-end mb-4">
          <div class="flex-1">
            <label class="text-xs text-slate-400 mb-1 block">Coin</label>
            <select id="backtestCoin"></select>
          </div>
          <button class="btn btn-primary" onclick="runBacktest()">Run Backtest</button>
        </div>
        <div id="backtestResult"></div>
      </div>
    </div>

    <!-- ── Portfolio tab ──────────────────────────────────────────── -->
    <div id="tab-portfolio" class="hidden space-y-6">

      <!-- Portfolio selector -->
      <div class="card p-4 flex flex-wrap items-center gap-4">
        <div class="flex items-center gap-3 flex-1">
          <label class="text-xs text-slate-400 whitespace-nowrap">Portfolio</label>
          <select id="pfSelector" onchange="switchPortfolio(this.value)" style="max-width:200px"></select>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
          <input id="newPfName" type="text" placeholder="new name" style="width:130px" />
          <button class="btn btn-ghost text-xs" onclick="createPortfolio()">+ New</button>
          <button class="btn btn-danger text-xs" onclick="deletePortfolio()" id="deletePfBtn">Delete</button>
          <button id="currencyToggle" class="btn btn-ghost text-xs" onclick="toggleCurrency()">Show in NOK</button>
        </div>
      </div>

      <div id="pfHero" class="card p-5 grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm"></div>

      <!-- Portfolio history chart -->
      <div class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Portfolio Value History</div>
        <div id="pfHistoryChart"><div class="text-slate-500 text-sm">No history yet.</div></div>
      </div>

      <div id="pfRecommendations" class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-3">What should I do?</div>
        <div class="flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Loading advice…</span></div>
      </div>

      <!-- Funds card -->
      <div class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Funds</div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div class="space-y-3">
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Amount (USD)</label>
              <input id="fundAmount" type="number" placeholder="1000" min="1" />
            </div>
            <div class="flex gap-3">
              <button class="btn btn-primary flex-1" onclick="doFund('deposit')">Deposit</button>
              <button class="btn btn-ghost flex-1"  onclick="doFund('withdraw')">Withdraw</button>
            </div>
          </div>
          <div id="fundMsg" class="flex items-center text-sm text-slate-400"></div>
        </div>
      </div>

      <div class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Trade</div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div class="space-y-3">
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Coin</label>
              <select id="tradeCoin"></select>
            </div>
            <div>
              <label class="text-xs text-slate-400 mb-1 block">Amount (USD)</label>
              <input id="tradeAmount" type="number" placeholder="100" min="1" />
            </div>
            <div class="flex gap-3">
              <button class="btn btn-primary flex-1" onclick="doTrade('buy')">Buy</button>
              <button class="btn btn-danger flex-1"  onclick="doTrade('sell')">Sell</button>
            </div>
          </div>
          <div id="tradeMsg" class="flex items-center text-sm text-slate-400"></div>
        </div>
      </div>

      <div class="card overflow-x-auto">
        <div class="px-5 py-4 border-b text-xs text-slate-400 uppercase tracking-widest" style="border-color:#1e2230">Holdings</div>
        <div id="holdingsTable"></div>
      </div>

      <div class="card overflow-x-auto">
        <div class="px-5 py-4 border-b flex items-center justify-between" style="border-color:#1e2230">
          <span class="text-xs text-slate-400 uppercase tracking-widest">Transactions</span>
          <div class="flex gap-2">
            <button class="btn btn-ghost text-xs" onclick="exportCsv()">Export CSV</button>
            <button class="btn btn-danger text-xs" onclick="resetPortfolio()">Reset</button>
          </div>
        </div>
        <div id="txnTable"></div>
      </div>
    </div>

    <!-- ── News tab ───────────────────────────────────────────────── -->
    <div id="tab-news" class="hidden">
      <div id="newsList" class="space-y-3">
        <div class="flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Loading news…</span></div>
      </div>
    </div>

    <!-- ── Admin tab ──────────────────────────────────────────────── -->
    <div id="tab-admin" class="hidden space-y-6">
      <div class="card p-5">
        <div class="text-xs text-slate-400 uppercase tracking-widest mb-4">Create User</div>
        <div class="grid sm:grid-cols-3 gap-4">
          <div>
            <label class="text-xs text-slate-400 mb-1 block">Username</label>
            <input id="newUser" type="text" placeholder="alice" />
          </div>
          <div>
            <label class="text-xs text-slate-400 mb-1 block">Password</label>
            <input id="newPass" type="password" placeholder="••••••" />
          </div>
          <div class="flex items-end">
            <button class="btn btn-primary w-full" onclick="createUser()">Create</button>
          </div>
        </div>
        <div id="createMsg" class="mt-3 text-xs hidden"></div>
      </div>

      <div class="card overflow-x-auto">
        <div class="px-5 py-4 border-b text-xs text-slate-400 uppercase tracking-widest" style="border-color:#1e2230">Users</div>
        <div id="userTable"></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const API = '';
let _token    = localStorage.getItem('pulsar_token')    || '';
let _username = localStorage.getItem('pulsar_username') || '';
let _isAdmin  = localStorage.getItem('pulsar_admin') === 'true';
let _coinsData     = [];
let _portfolioData = null;
let _currentTab    = 'market';
let _refreshTimer  = null;
let _watchlist     = [];
let _activePf      = 'default';
let _portfolioNames = ['default'];
let _currency = localStorage.getItem('pulsar_currency') || 'USD';
let _nokRate  = 10.5;

// ── Auth helpers ──────────────────────────────────────────────────────────────
function authHdrs() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${_token}` };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, opts);
  if (res.status === 401) { doLogout(); return null; }
  return res;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, ok = true) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = ok ? '#16a34a' : '#dc2626';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Login / Logout ────────────────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.add('hidden');
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass }),
    });
    if (!res.ok) {
      errEl.textContent = 'Invalid username or password.';
      errEl.classList.remove('hidden');
      return;
    }
    const data = await res.json();
    _token    = data.access_token;
    _username = data.username;
    _isAdmin  = data.is_admin;
    localStorage.setItem('pulsar_token',    _token);
    localStorage.setItem('pulsar_username', _username);
    localStorage.setItem('pulsar_admin',    _isAdmin);
    showApp();
  } catch {
    errEl.textContent = 'Cannot reach the server.';
    errEl.classList.remove('hidden');
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  _token = ''; _username = ''; _isAdmin = false;
  localStorage.removeItem('pulsar_token');
  localStorage.removeItem('pulsar_username');
  localStorage.removeItem('pulsar_admin');
  clearInterval(_refreshTimer);
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ── App bootstrap ─────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('navUser').textContent = _username;
  document.getElementById('navUser').classList.remove('hidden');
  if (_isAdmin) {
    document.getElementById('navAdmin').classList.remove('hidden');
    document.getElementById('adminTab').style.display = '';
  }
  loadMarket();
  loadFearGreed();
  loadCoins();
  loadWatchlist();
  loadPortfolioNames();
  loadPortfolio();
  _refreshTimer = setInterval(() => {
    loadCoins();
    loadFearGreed();
    loadMarket();
    if (_currentTab === 'portfolio') loadPortfolio();
    if (_currentTab === 'signals')   loadSignals();
    if (_currentTab === 'admin')     loadUsers();
    if (_currentTab === 'news')      loadNews();
  }, 60_000);
}

if (_token) showApp();

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  _currentTab = name;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name)
  );
  ['market','signals','portfolio','news','admin'].forEach(t =>
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== name)
  );
  if (name === 'signals')   loadSignals();
  if (name === 'portfolio') loadPortfolio();
  if (name === 'news')      loadNews();
  if (name === 'admin')     loadUsers();
}

// ── Formatting ────────────────────────────────────────────────────────────────
function fmtPrice(n) {
  if (n >= 1000) return '$' + n.toLocaleString('en', { maximumFractionDigits: 0 });
  if (n >= 1)    return '$' + n.toFixed(2);
  return '$' + n.toFixed(6);
}
function fmtPct(n) {
  const cls = n >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${n >= 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
}
function fmtUsd(n) {
  return '$' + n.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtNok(n) {
  return 'kr ' + Math.round(n).toLocaleString('nb-NO');
}
function fmtVal(usd, nok) {
  return _currency === 'NOK' ? fmtNok(nok ?? (usd * _nokRate)) : fmtUsd(usd);
}
function toggleCurrency() {
  _currency = _currency === 'USD' ? 'NOK' : 'USD';
  localStorage.setItem('pulsar_currency', _currency);
  const btn = document.getElementById('currencyToggle');
  if (btn) btn.textContent = _currency === 'NOK' ? 'Show in USD' : 'Show in NOK';
  renderPortfolio();
}
function fmtLarge(n) {
  if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6)  return '$' + (n / 1e6).toFixed(1) + 'M';
  return '$' + n.toFixed(0);
}
function signalTag(sig) {
  const map = {
    strong_buy: ['tag-strong-buy', 'STRONG BUY'],
    buy:        ['tag-buy',        'BUY'],
    neutral:    ['tag-neutral',    'NEUTRAL'],
    caution:    ['tag-caution',    'CAUTION'],
    sell:       ['tag-sell',       'SELL'],
    hold:       ['tag-hold',       'HOLD'],
  };
  const [cls, label] = map[sig] || ['tag-neutral', sig.toUpperCase()];
  return `<span class="tag ${cls}">${label}</span>`;
}

function sparkline(prices, w = 64, h = 28) {
  if (!prices || prices.length < 2) return '';
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const range = max - min || 1;
  const pts = prices.map((p, i) => {
    const x = (i / (prices.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 2) - 1;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const up = prices[prices.length - 1] >= prices[0];
  const stroke = up ? '#4ade80' : '#f87171';
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" style="display:block">` +
    `<polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.5" ` +
    `stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function historyChart(points, w = 600, h = 80) {
  if (!points || points.length < 2) return '<div class="text-slate-500 text-sm">Not enough history yet.</div>';
  const vals = points.map(p => p.total_value);
  const min = Math.min(...vals);
  const max = Math.max(...vals);
  const range = max - min || 1;
  const pts = vals.map((v, i) => {
    const x = (i / (vals.length - 1)) * (w - 4) + 2;
    const y = h - ((v - min) / range) * (h - 6) - 3;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const up = vals[vals.length - 1] >= vals[0];
  const stroke = up ? '#4ade80' : '#f87171';
  const first = points[0].date;
  const last = points[points.length - 1].date;
  const curVal = vals[vals.length - 1];
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">
      <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="1.8"
        stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
    <div class="flex justify-between text-xs text-slate-500 mt-1">
      <span>${first}</span>
      <span class="${up ? 'pos' : 'neg'} font-semibold">${fmtUsd(curVal)}</span>
      <span>${last}</span>
    </div>`;
}

// ── Plain-language indicator helpers ─────────────────────────────────────────
function rsiLabel(v) {
  if (v == null) return '—';
  if (v < 30) return `Oversold (${v.toFixed(0)})`;
  if (v < 45) return `Below average (${v.toFixed(0)})`;
  if (v < 55) return `Neutral (${v.toFixed(0)})`;
  if (v < 70) return `Healthy (${v.toFixed(0)})`;
  return `Overbought (${v.toFixed(0)})`;
}
function macdLabel(v) {
  if (v == null) return '—';
  if (v > 50)  return 'Strong uptrend';
  if (v > 0)   return 'Mild uptrend';
  if (v > -50) return 'Mild downtrend';
  return 'Strong downtrend';
}
function bbLabel(v) {
  if (v == null) return '—';
  const p = v * 100;
  if (p < 20) return `Near support (${p.toFixed(0)}%)`;
  if (p < 40) return `Lower range (${p.toFixed(0)}%)`;
  if (p < 60) return `Mid-range (${p.toFixed(0)}%)`;
  if (p < 80) return `Upper range (${p.toFixed(0)}%)`;
  return `Near resistance (${p.toFixed(0)}%)`;
}
function indicatorColor(label) {
  if (!label || label === '—') return '';
  const l = label.toLowerCase();
  if (l.includes('oversold') || l.includes('strong up') || l.includes('near support') || l.includes('healthy')) return 'pos';
  if (l.includes('overbought') || l.includes('strong down') || l.includes('near resistance')) return 'neg';
  if (l.includes('mild up') || l.includes('lower range')) return 'pos';
  if (l.includes('mild down')) return 'neg';
  return '';
}

// ── Watchlist ─────────────────────────────────────────────────────────────────
async function loadWatchlist() {
  const res = await apiFetch('/api/watchlist', { headers: authHdrs() });
  if (!res || !res.ok) return;
  _watchlist = await res.json();
  renderCoinStars();
}

function renderCoinStars() {
  document.querySelectorAll('.star-btn[data-coin]').forEach(btn => {
    const id = btn.dataset.coin;
    btn.textContent = _watchlist.includes(id) ? '★' : '☆';
    btn.classList.toggle('watched', _watchlist.includes(id));
  });
}

async function toggleWatchlist(coinId) {
  const watched = _watchlist.includes(coinId);
  const method = watched ? 'DELETE' : 'POST';
  const res = await apiFetch(`/api/watchlist/${coinId}`, { method, headers: authHdrs() });
  if (!res || !res.ok) return;
  _watchlist = await res.json();
  renderCoinStars();
  toast(watched ? `Removed ${coinId} from watchlist` : `Added ${coinId} to watchlist`);
}

    sel.innerHTML = d.coins
      .map(c => `<option value="${c.id}">${c.name} (${c.symbol.toUpperCase()})</option>`)

      .map(c => `<option value="${c.id}">${c.name} (${c.symbol.toUpperCase()})</option>`)

          <div class="flex items-center gap-3">
            ${c.image ? `<img src="${c.image}" class="w-8 h-8 rounded-full" alt="${c.symbol}" />` : ''}
            <div>
              <div class="font-semibold">${c.name} <span class="text-slate-500 text-xs">${c.symbol.toUpperCase()}</span></div>
              <div class="text-slate-400 text-sm">${fmtPrice(c.price)}</div>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            ${sparkline(c.price_history_7d)}
            ${signalTag(c.signal)}
            <span class="text-xs">${fmtPct(c.change_24h)}</span>
            <button class="star-btn ${isWatched ? 'watched' : ''}" data-coin="${c.id}"
              onclick="toggleWatchlist('${c.id}')" title="${isWatched ? 'Remove from watchlist' : 'Add to watchlist'}">

async function runBacktest() {
  const coinId = document.getElementById('backtestCoin').value;
  if (!coinId) return;
  const el = document.getElementById('backtestResult');
  el.innerHTML = '<div class="flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Running…</span></div>';
  const res = await apiFetch(`/api/backtest/${coinId}`);
  if (!res || !res.ok) {
    el.innerHTML = '<div class="text-red-400 text-sm">Backtest failed — no OHLC data available.</div>';
    return;
  }
  const d = await res.json();
  function statCard(label, stats) {
    if (!stats || stats.count === 0) return `<div class="rounded-lg p-3 text-center" style="background:#0d0f14"><div class="text-slate-500 text-xs mb-1">${label}</div><div class="text-slate-600 text-sm">No signals</div></div>`;
    const wr = stats.win_rate;
    const wrCls = wr >= 55 ? 'pos' : wr < 45 ? 'neg' : '';
    const ar = stats.avg_return;
    const arCls = ar >= 0 ? 'pos' : 'neg';
    return `
      <div class="rounded-lg p-3" style="background:#0d0f14">
        <div class="text-slate-500 text-xs mb-2 uppercase tracking-wider">${label}</div>
        <div class="grid grid-cols-3 gap-2 text-xs text-center">
          <div><div class="text-slate-500">Signals</div><div class="font-semibold">${stats.count}</div></div>
          <div><div class="text-slate-500">Win rate</div><div class="font-semibold ${wrCls}">${wr != null ? wr.toFixed(1) + '%' : '—'}</div></div>
          <div><div class="text-slate-500">Avg return</div><div class="font-semibold ${arCls}">${ar != null ? (ar >= 0 ? '+' : '') + ar.toFixed(2) + '%' : '—'}</div></div>
        </div>
      </div>`;
  }
  el.innerHTML = `
    <div class="text-xs text-slate-500 mb-3">${d.total_signals} total signals · ${d.forward_days}-day forward window</div>
    <div class="grid sm:grid-cols-3 gap-3 mb-4">
      ${statCard('Buy signals', d.buy)}
      ${statCard('Hold signals', d.hold)}
      ${statCard('Sell signals', d.sell)}
    </div>
    ${d.recent.length > 0 ? `
    <div class="text-xs text-slate-400 uppercase tracking-wider mb-2">Recent signals</div>
    <div style="max-height:200px;overflow-y:auto">
      <table>
        <thead><tr><th>Date</th><th>Signal</th><th>Score</th><th>Entry</th><th>${d.forward_days}d return</th></tr></thead>
        <tbody>
          ${d.recent.slice().reverse().map(r => `
            <tr>
              <td class="text-slate-500 text-xs">${r.date}</td>
              <td>${signalTag(r.signal)}</td>
              <td>${r.signal_score.toFixed(0)}</td>
              <td>${fmtPrice(r.entry_price)}</td>
              <td class="${r.fwd_return >= 0 ? 'pos' : 'neg'}">${r.fwd_return >= 0 ? '+' : ''}${r.fwd_return.toFixed(2)}%</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

// ── Portfolio tab ─────────────────────────────────────────────────────────────
async function loadPortfolioNames() {
  const res = await apiFetch('/api/portfolios', { headers: authHdrs() });
  if (!res || !res.ok) return;
  _portfolioNames = await res.json();
  renderPfSelector();
}

function renderPfSelector() {
  const sel = document.getElementById('pfSelector');
  if (!sel) return;
  sel.innerHTML = _portfolioNames.map(n =>
    `<option value="${n}" ${n === _activePf ? 'selected' : ''}>${n}</option>`
  ).join('');
  const deleteBtn = document.getElementById('deletePfBtn');
  if (deleteBtn) deleteBtn.disabled = _activePf === 'default';
}

async function switchPortfolio(name) {
  _activePf = name;
  renderPfSelector();
  await loadPortfolio();
}

async function createPortfolio() {
  const nameEl = document.getElementById('newPfName');
  const name = nameEl.value.trim().toLowerCase();
  if (!name) { toast('Enter a portfolio name', false); return; }
  const res = await apiFetch('/api/portfolios', {
    method: 'POST', headers: authHdrs(), body: JSON.stringify({ name }),
  });
  if (!res) return;
  if (!res.ok) { const err = await res.json(); toast(err.detail, false); return; }
  nameEl.value = '';
  _portfolioNames = await (await apiFetch('/api/portfolios', { headers: authHdrs() })).json();
  _activePf = name;
  renderPfSelector();
  await loadPortfolio();
  toast(`Portfolio "${name}" created`);
}

async function deletePortfolio() {
  if (_activePf === 'default') { toast('Cannot delete the default portfolio', false); return; }
  if (!confirm(`Delete portfolio "${_activePf}"? All data will be lost.`)) return;
  const res = await apiFetch(`/api/portfolios/${_activePf}`, { method: 'DELETE', headers: authHdrs() });
  if (!res || !res.ok) { toast('Failed to delete portfolio', false); return; }
  _activePf = 'default';
  _portfolioNames = await (await apiFetch('/api/portfolios', { headers: authHdrs() })).json();
  renderPfSelector();
  await loadPortfolio();
  toast(`Portfolio deleted`);
}

async function loadPortfolio() {
  const res = await apiFetch(`/api/portfolio?portfolio=${_activePf}`, { headers: authHdrs() });
  if (!res || !res.ok) return;
  _portfolioData = await res.json();
  if (_portfolioData.nok_rate) _nokRate = _portfolioData.nok_rate;
  const btn = document.getElementById('currencyToggle');
  if (btn) btn.textContent = _currency === 'NOK' ? 'Show in USD' : 'Show in NOK';
  renderPortfolio();
  loadRecommendations();
  loadPortfolioHistory();
}

async function loadPortfolioHistory() {
  const res = await apiFetch(`/api/portfolio/history?portfolio=${_activePf}`, { headers: authHdrs() });
  if (!res || !res.ok) return;
  const history = await res.json();
  document.getElementById('pfHistoryChart').innerHTML = historyChart(history);
}

function renderPortfolio() {
  if (!_portfolioData) return;
  const p = _portfolioData;
  const pnlCls = p.total_pnl >= 0 ? 'pos' : 'neg';
  const isCurrNok = _currency === 'NOK';

  document.getElementById('pfHero').innerHTML = `
    <div>
      <div class="text-xs text-slate-500 mb-1">Total Value</div>
      <div class="text-xl font-bold">${fmtVal(p.total_value, p.total_value_nok)}</div>
      ${isCurrNok ? '' : `<div class="text-xs text-slate-600 mt-0.5">${fmtNok(p.total_value_nok)}</div>`}
    </div>
    <div>
      <div class="text-xs text-slate-500 mb-1">Cash Available</div>
      <div class="font-semibold">${fmtVal(p.cash, p.cash_nok)}</div>
      ${isCurrNok ? '' : `<div class="text-xs text-slate-600 mt-0.5">${fmtNok(p.cash_nok)}</div>`}
    </div>
    <div>
      <div class="text-xs text-slate-500 mb-1">Net Invested</div>
      <div class="font-semibold">${fmtVal(p.net_invested, p.net_invested * _nokRate)}</div>

      <div class="font-semibold ${pnlCls}">${fmtVal(p.total_pnl, p.total_pnl_nok)} (${p.total_pnl_pct.toFixed(2)}%)</div>
    </div>
  `;

  if (p.holdings.length === 0) {
    document.getElementById('holdingsTable').innerHTML =
      '<div class="p-5 text-slate-500 text-sm">No holdings yet. Use the Trade panel to get started.</div>';
  } else {
    document.getElementById('holdingsTable').innerHTML = `
      <table>
        <thead>
          <tr><th>Coin</th><th>Amount</th><th>You Paid</th><th>Current</th><th>Value</th><th>Profit/Loss</th></tr>
        </thead>
        <tbody>
          ${p.holdings.map(h => `
            <tr>
              <td>
                <div class="flex items-center gap-2">
                  ${h.image ? `<img src="${h.image}" class="w-5 h-5 rounded-full" />` : ''}
                  <span>${h.symbol.toUpperCase()}</span>
                </div>
              </td>
              <td>${parseFloat(h.amount).toFixed(6)}</td>
              <td>${fmtPrice(h.avg_buy_price)}</td>
              <td>${fmtPrice(h.current_price)}</td>
              <td>
                ${fmtVal(h.value, h.value_nok)}
                ${_currency === 'USD' ? `<div class="text-xs text-slate-600">${fmtNok(h.value_nok)}</div>` : ''}
              </td>
              <td class="${h.pnl >= 0 ? 'pos' : 'neg'}">${fmtVal(h.pnl, h.pnl_nok)} (${h.pnl_pct.toFixed(2)}%)</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

  }

  if (p.transactions.length === 0) {
    document.getElementById('txnTable').innerHTML =
      '<div class="p-5 text-slate-500 text-sm">No transactions yet.</div>';
  } else {
    const txnTypeHtml = {
      buy:        '<span class="pos font-semibold">BUY</span>',

      deposit:    '<span style="color:#818cf8" class="font-semibold">DEPOSIT</span>',
      withdrawal: '<span style="color:#fb923c" class="font-semibold">WITHDRAWAL</span>',

async function doTrade(type) {
  const coin_id    = document.getElementById('tradeCoin').value;
  const usd_amount = parseFloat(document.getElementById('tradeAmount').value);
  const msgEl      = document.getElementById('tradeMsg');
  if (!coin_id || isNaN(usd_amount) || usd_amount < 1) {
    msgEl.innerHTML = '<span class="neg">Enter a valid USD amount (min $1).</span>';
    return;
  }
  const res = await apiFetch(`/api/portfolio/${type}`, {
    method: 'POST',
    headers: authHdrs(),
    body: JSON.stringify({ coin_id, usd_amount, portfolio: _activePf }),
  });
  if (!res) return;
  if (!res.ok) {
    const err = await res.json();
    msgEl.innerHTML = `<span class="neg">${err.detail}</span>`;
    return;
  }
  _portfolioData = await res.json();
  if (_portfolioData.nok_rate) _nokRate = _portfolioData.nok_rate;
  renderPortfolio();
  loadPortfolioHistory();
  document.getElementById('tradeAmount').value = '';
  const verb = type === 'buy' ? 'Bought' : 'Sold';
  msgEl.innerHTML = `<span class="pos">✓ ${verb} ${fmtUsd(usd_amount)} of ${coin_id.toUpperCase()}</span>`;
  toast(`${verb} ${fmtUsd(usd_amount)} of ${coin_id.toUpperCase()}`);
}

async function doFund(type) {
  const amount = parseFloat(document.getElementById('fundAmount').value);
  const msgEl  = document.getElementById('fundMsg');
  if (!amount || amount <= 0) {
    msgEl.innerHTML = '<span class="neg">Enter a positive amount.</span>';
    return;
  }
  const endpoint = type === 'deposit' ? '/api/portfolio/deposit' : '/api/portfolio/withdraw';
  const res = await apiFetch(endpoint, {
    method: 'POST',
    headers: authHdrs(),
    body: JSON.stringify({ amount, portfolio: _activePf }),
  });
  if (!res) return;
  if (!res.ok) {
    const err = await res.json();
    msgEl.innerHTML = `<span class="neg">${err.detail}</span>`;
    return;
  }
  _portfolioData = await res.json();
  if (_portfolioData.nok_rate) _nokRate = _portfolioData.nok_rate;
  renderPortfolio();
  loadPortfolioHistory();
  document.getElementById('fundAmount').value = '';
  const verb = type === 'deposit' ? 'Deposited' : 'Withdrew';
  msgEl.innerHTML = `<span class="pos">✓ ${verb} ${fmtUsd(amount)}</span>`;
  toast(`${verb} ${fmtUsd(amount)}`);
}

async function resetPortfolio() {
  if (!confirm('Reset portfolio to $0? All holdings and transactions will be cleared. This cannot be undone.')) return;
  const res = await apiFetch(`/api/portfolio/reset?portfolio=${_activePf}`, {
    method: 'POST', headers: authHdrs(),
  });
  if (!res || !res.ok) return;
  _portfolioData = await res.json();
  if (_portfolioData.nok_rate) _nokRate = _portfolioData.nok_rate;
  renderPortfolio();
  loadPortfolioHistory();
  toast('Portfolio reset to $0');
}

function exportCsv() {
  if (!_portfolioData || !_portfolioData.transactions.length) {
    toast('No transactions to export.', false);
    return;
  }
  const rows = [['ID', 'Type', 'Coin', 'Amount', 'Price', 'Total', 'Timestamp']];
  for (const t of _portfolioData.transactions) {
    rows.push([t.id, t.type, t.coin_id, t.amount, t.price, t.total, t.timestamp]);
  }
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `pulsar_portfolio_${_username}_${_activePf}.csv`;
  a.click();
}

// ── Recommendations ───────────────────────────────────────────────────────────
async function loadRecommendations() {
  const el = document.getElementById('pfRecommendations');
  if (!el) return;
  const res = await apiFetch(`/api/portfolio/recommendation?portfolio=${_activePf}`, { headers: authHdrs() });
  if (!res || !res.ok) {
    el.innerHTML = '<div class="text-xs text-slate-400 uppercase tracking-widest mb-3">What should I do?</div><div class="text-slate-500 text-sm">Could not load advice.</div>';
    return;
  }
  const d = await res.json();
  const actionMap = {
    buy:  ['tag-buy',  'BUY'],
    sell: ['tag-sell', 'SELL'],
    hold: ['tag-hold', 'HOLD'],
  };
  const recCards = d.recommendations.length === 0
    ? '<div class="text-slate-500 text-sm">No positions to review — signals are quiet right now.</div>'
    : d.recommendations.map(r => {
        const [tagCls, tagLabel] = actionMap[r.action] || ['tag-neutral', r.action.toUpperCase()];
        const btn = (r.action === 'buy' || r.action === 'sell') && r.suggested_usd
          ? `<button class="btn btn-ghost text-xs py-1 px-3"
               onclick="prefillTrade('${r.coin_id}','${r.action}',${r.suggested_usd})">
               Pre-fill ${r.action} $${r.suggested_usd.toLocaleString('en',{maximumFractionDigits:0})}
             </button>`
          : '';
        return `
          <div class="rounded-lg p-4 space-y-1" style="background:#0d0f14;border:1px solid #1e2230">
            <div class="flex items-center justify-between gap-2 flex-wrap">
              <div class="font-semibold text-sm">${r.name} <span class="text-slate-500 text-xs">${r.symbol}</span></div>
              <div class="flex items-center gap-2">${'<span class="tag ' + tagCls + '">' + tagLabel + '</span>'}${btn}</div>
            </div>
            <div class="text-sm text-slate-200">${r.plain}</div>
            <div class="text-xs text-slate-400">${r.detail}</div>
          </div>`;
      }).join('');
  el.innerHTML = `
    <div class="text-xs text-slate-400 uppercase tracking-widest mb-3">What should I do?</div>
    <p class="text-sm text-slate-300 mb-4">${d.summary}</p>
    <div class="space-y-3">${recCards}</div>
  `;
}

function prefillTrade(coinId, action, amount) {
  switchTab('portfolio');
  const sel = document.getElementById('tradeCoin');
  if (sel) sel.value = coinId;
  const amtEl = document.getElementById('tradeAmount');
  if (amtEl) { amtEl.value = amount; amtEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
  toast(`Pre-filled: ${action} $${Number(amount).toLocaleString('en',{maximumFractionDigits:0})} of ${coinId.toUpperCase()}`);
}

// ── News tab ──────────────────────────────────────────────────────────────────
async function loadNews() {
  const el = document.getElementById('newsList');
  if (!el) return;
  el.innerHTML = '<div class="flex items-center gap-2 text-slate-500 text-sm"><div class="spinner"></div><span>Loading news…</span></div>';
  const res = await apiFetch('/api/news');
  if (!res || !res.ok) {
    el.innerHTML = '<div class="card p-5 text-red-400 text-sm">Could not load news.</div>';
    return;
  }
  const d = await res.json();
  if (!d.news || d.news.length === 0) {
    el.innerHTML = '<div class="card p-5 text-slate-500 text-sm">No news available right now.</div>';
    return;
  }
  el.innerHTML = d.news.map(item => {
    const date = item.published_at ? new Date(item.published_at).toLocaleString() : '';
    const thumb = item.thumb
      ? `<img src="${item.thumb}" class="w-10 h-10 rounded object-cover flex-shrink-0" alt="" onerror="this.style.display='none'" />`
      : '';
    return `
      <a href="${item.url}" target="_blank" rel="noopener" class="card p-4 flex gap-4 items-start hover:border-brand transition-colors" style="text-decoration:none;display:flex">
        ${thumb}
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm leading-snug mb-1">${item.title || 'No title'}</div>
          ${item.description ? `<div class="text-xs text-slate-400 line-clamp-2 mb-2">${item.description}</div>` : ''}
          <div class="text-xs text-slate-600">${item.author || ''} ${date ? '· ' + date : ''}</div>
        </div>
      </a>`;
  }).join('');
}

// ── Admin tab ─────────────────────────────────────────────────────────────────
async function loadUsers() {
  const el = document.getElementById('userTable');
  el.innerHTML = '<div class="p-4 text-slate-500 text-sm">Loading…</div>';
  const res = await apiFetch('/api/auth/users', { headers: authHdrs() });
  if (!res || !res.ok) {
    el.innerHTML = '<div class="p-4 text-red-400">Not authorised.</div>';
    return;
  }
  const users = await res.json();
  if (!users.length) {
    el.innerHTML = '<div class="p-5 text-slate-500 text-sm">No users found.</div>';
    return;
  }
  el.innerHTML = `
    <table>
      <thead>
        <tr><th>Username</th><th>Role</th><th>Created</th><th>Created by</th><th></th></tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td class="font-semibold">${u.username}</td>
            <td>${u.is_admin
              ? '<span class="tag tag-buy">ADMIN</span>'
              : '<span class="tag tag-neutral">USER</span>'}</td>
            <td class="text-xs text-slate-400">${new Date(u.created_at).toLocaleDateString()}</td>
            <td class="text-xs text-slate-400">${u.created_by || '—'}</td>
            <td>${!u.is_admin
              ? `<button class="btn btn-danger text-xs py-1 px-3" onclick="deleteUser('${u.username}')">Delete</button>`
              : ''}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function createUser() {
  const username = document.getElementById('newUser').value.trim();
  const password = document.getElementById('newPass').value;
  const msgEl    = document.getElementById('createMsg');
  msgEl.classList.add('hidden');
  if (!username || !password) {
    msgEl.textContent = 'Username and password are required.';
    msgEl.className   = 'mt-3 text-xs text-red-400';
    return;
  }
  const res = await apiFetch('/api/auth/users', {
    method: 'POST',
    headers: authHdrs(),
    body: JSON.stringify({ username, password }),
  });
  if (!res) return;
  if (!res.ok) {
    const err     = await res.json();
    msgEl.textContent = err.detail;
    msgEl.className   = 'mt-3 text-xs text-red-400';
    msgEl.classList.remove('hidden');
    return;
  }
  document.getElementById('newUser').value = '';
  document.getElementById('newPass').value = '';
  msgEl.textContent = `User "${username}" created.`;
  msgEl.className   = 'mt-3 text-xs text-green-400';
  msgEl.classList.remove('hidden');
  toast(`User "${username}" created`);
  loadUsers();
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}"? They will no longer be able to sign in.`)) return;
  const res = await apiFetch(`/api/auth/users/${username}`, {
    method: 'DELETE', headers: authHdrs(),
  });
  if (!res || !res.ok) { toast('Failed to delete user.', false); return; }
  toast(`User "${username}" deleted`);
  loadUsers();
}
</script>
